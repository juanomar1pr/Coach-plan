<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coach Rosetta Stone — USAG Class Builder</title>
  <style>
    @page { size: letter; margin: 0.4in 0.45in; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 13px;
      line-height: 1.4;
      color: #111;
      background: #e8e8e8;
    }

    /* ── BUILDER (screen only) ── */
    .builder {
      max-width: 1100px;
      margin: 0 auto;
      padding: 12px 16px 24px;
    }
    .toolbar {
      background: #222; color: #fff;
      padding: 10px 14px; border-radius: 6px;
      display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
      margin-bottom: 14px; position: sticky; top: 0; z-index: 50;
    }
    .toolbar h1 { font-size: 15px; font-weight: 700; margin-right: 12px; }
    .toolbar button {
      background: #fff; color: #222; border: none;
      padding: 7px 14px; font-weight: 600; cursor: pointer; border-radius: 4px;
    }
    .toolbar button.primary { background: #2563eb; color: #fff; }
    .toolbar button.ghost { background: #444; color: #fff; }
    .toolbar .status { font-size: 11px; color: #86efac; margin-left: auto; }

    .setup-row {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
      background: #fff; padding: 12px; border-radius: 6px;
      border: 1px solid #ccc; margin-bottom: 12px;
    }
    .setup-row label { font-size: 11px; font-weight: 600; color: #555; display: block; margin-bottom: 3px; }
    .setup-row input, .setup-row select {
      width: 100%; padding: 6px 8px; border: 1px solid #bbb; border-radius: 4px; font-size: 13px;
    }

    .selector-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    @media (max-width: 900px) { .selector-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .selector-grid { grid-template-columns: 1fr; } }

    fieldset.panel {
      background: #fff; border: 1px solid #ccc; border-radius: 6px;
      padding: 10px 12px; margin: 0;
    }
    fieldset.panel legend {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; padding: 0 6px; color: #222;
    }
    fieldset.panel.wide { grid-column: span 2; }
    fieldset.panel.full { grid-column: 1 / -1; }

    .check-list {
      max-height: 160px; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px;
    }
    .check-list.tall { max-height: 240px; }
    .check-list.xl { max-height: 320px; }
    .check-list.xxl { max-height: 400px; }
    .check-list label {
      display: flex; align-items: flex-start; gap: 6px;
      font-size: 11.5px; padding: 3px 4px; border-radius: 3px; cursor: pointer;
    }
    .check-list label:hover { background: #f0f4ff; }
    .check-list input { margin-top: 2px; flex-shrink: 0; }
    .panel-actions {
      display: flex; gap: 6px; margin-top: 6px; padding-top: 6px; border-top: 1px solid #eee;
    }
    .panel-actions button {
      font-size: 10px; padding: 3px 8px; border: 1px solid #bbb;
      background: #f5f5f5; border-radius: 3px; cursor: pointer;
    }
    .panel-actions button.danger { color: #b91c1c; border-color: #fca5a5; }
    .add-drill-panel {
      background: #fff; border: 2px solid #2563eb; border-radius: 6px;
      padding: 12px 14px; margin-bottom: 12px;
    }
    .add-drill-panel h2 {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.04em; margin-bottom: 8px; color: #2563eb;
    }
    .add-drill-row {
      display: grid; grid-template-columns: 1.2fr 2fr 1.5fr auto auto;
      gap: 8px; align-items: end;
    }
    @media (max-width: 800px) { .add-drill-row { grid-template-columns: 1fr 1fr; } }
    .add-drill-row label { font-size: 10px; font-weight: 600; color: #555; display: block; margin-bottom: 2px; }
    .add-drill-row input, .add-drill-row select {
      width: 100%; padding: 6px 8px; border: 1px solid #bbb; border-radius: 4px; font-size: 12px;
    }
    .add-drill-row button { padding: 7px 12px; font-weight: 600; border-radius: 4px; cursor: pointer; border: none; }
    .add-drill-row button.add { background: #2563eb; color: #fff; }
    .custom-tag { font-size: 9px; background: #dbeafe; color: #1d4ed8; padding: 1px 4px; border-radius: 2px; margin-left: 4px; }

    .preview-label {
      font-size: 12px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; color: #444; margin: 8px 0 10px;
      padding-bottom: 4px; border-bottom: 2px solid #222;
    }

    /* ── PRINT PLAN ── */
    #print-area {
      background: #fff;
      max-width: 8.5in;
      margin: 0 auto;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    #print-area .page {
      width: 8.5in; min-height: 10.7in;
      padding: 0.4in 0.45in;
      page-break-after: always;
      position: relative;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 8pt;
      line-height: 1.35;
    }
    #print-area .page:last-child { page-break-after: auto; }
    #print-area header {
      border-bottom: 2px solid #111; padding-bottom: 6px; margin-bottom: 10px;
    }
    #print-area header h1 {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 14pt; font-weight: 700;
    }
    #print-area header .meta {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 7.5pt; color: #444; margin-top: 4px;
      display: flex; flex-wrap: wrap; gap: 12px;
    }
    #print-area h2 {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 8.5pt; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.05em; margin: 10px 0 5px;
      padding-bottom: 2px; border-bottom: 1px solid #ccc;
    }
    #print-area h3 {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 8pt; font-weight: 600; margin: 7px 0 4px; color: #333;
    }
    #print-area table {
      width: 100%; border-collapse: collapse; margin-bottom: 8px; font-size: 7.5pt;
    }
    #print-area th {
      font-family: "Helvetica Neue", Arial, sans-serif;
      background: #222; color: #fff; font-weight: 600;
      text-align: left; padding: 3px 5px; font-size: 7pt;
    }
    #print-area td { border: 1px solid #ccc; padding: 3px 5px; vertical-align: top; }
    #print-area tr:nth-child(even) td { background: #fafafa; }
    #print-area .note {
      font-size: 7.5pt; color: #444; margin-bottom: 8px;
      padding: 5px 8px; background: #f5f5f5; border: 1px solid #ddd;
    }
    #print-area pre.seq {
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 7.5pt; background: #f9f9f9; border: 1px solid #ddd;
      padding: 6px 8px; margin-bottom: 8px; white-space: pre-wrap;
    }
    #print-area .footer {
      position: absolute; bottom: 0.4in; left: 0.45in; right: 0.45in;
      font-size: 6.5pt; color: #888;
      border-top: 1px solid #ddd; padding-top: 4px;
      display: flex; justify-content: space-between;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }
    #print-area .empty { color: #999; font-style: italic; font-size: 7.5pt; }

    @media print {
      body { background: #fff; }
      .builder { display: none !important; }
      #print-area { box-shadow: none; max-width: none; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>

<!-- ═══════════════ BUILDER UI ═══════════════ -->
<div class="builder">

  <div class="toolbar">
    <h1>Coach Rosetta Stone — USAG L1–L5</h1>
    <input type="search" id="drillSearch" placeholder="Search all drills…" oninput="filterDrills(this.value)" style="flex:1;min-width:140px;max-width:220px;padding:6px 10px;border-radius:4px;border:none;font-size:12px;">
    <button type="button" class="primary" onclick="buildPlan()">Update plan</button>
    <button type="button" onclick="window.print()">Print / PDF</button>
    <button type="button" onclick="saveSelections()">Save selections</button>
    <button type="button" class="ghost" onclick="resetAll()">Reset all</button>
    <span class="status" id="status"></span>
  </div>

  <div class="setup-row">
    <div><label>Club</label><input type="text" id="club" placeholder="Club name"></div>
    <div><label>Date</label><input type="date" id="date"></div>
    <div><label>Coach</label><input type="text" id="coach" placeholder="Coach name"></div>
    <div>
      <label>Day preset (auto-selects focus)</label>
      <select id="dayPreset" onchange="applyDayPreset()">
        <option value="">— Manual —</option>
        <option value="mon">Monday — Vault focus</option>
        <option value="tue">Tuesday — Bars focus</option>
        <option value="wed">Wednesday — Beam focus</option>
        <option value="thu">Thursday — Floor focus</option>
        <option value="test">Testing day — full battery</option>
      </select>
    </div>
  </div>

  <div class="add-drill-panel">
    <h2>Add your own drill — saved in this browser</h2>
    <div class="add-drill-row">
      <div><label>Category</label><select id="customCat"></select></div>
      <div><label>Drill name (universal / gym name)</label><input type="text" id="customLabel" placeholder="e.g. Skin the cat through pike"></div>
      <div><label>Cue / reps / equipment</label><input type="text" id="customCue" placeholder="e.g. 2 reps · hollow shape"></div>
      <button type="button" class="add" onclick="addCustomDrill()">Add</button>
      <button type="button" onclick="exportCustomDrills()" title="Copy JSON backup">Export</button>
    </div>
  </div>

  <div class="selector-grid" id="selector-grid"></div>

  <p class="preview-label">Generated class plan — updates when you click "Update plan"</p>
</div>

<!-- ═══════════════ PRINT OUTPUT ═══════════════ -->
<div id="print-area"></div>

<script>
const STORAGE_KEY = 'coach-rosetta-stone-v4';
const CUSTOM_KEY = 'coach-rosetta-custom-v1';

function loadCustomDrills() {
  try {
    const raw = localStorage.getItem(CUSTOM_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch(e) { return []; }
}

function saveCustomDrills(list) {
  localStorage.setItem(CUSTOM_KEY, JSON.stringify(list));
}

function mergeCustomIntoCategories() {
  const customs = loadCustomDrills();
  customs.forEach(c => {
    if (!CATEGORIES[c.cat]) return;
    if (!CATEGORIES[c.cat].items.find(i => i.id === c.id)) {
      CATEGORIES[c.cat].items.push({
        id: c.id, label: c.label, custom: true,
        cue: c.cue, equip: c.cue, spot: c.cue, target: c.cue,
        block: c.cue, phase: c.cue, angle: c.cue, time: c.cue
      });
    }
  });
}

function addCustomDrill() {
  const cat = document.getElementById('customCat').value;
  const label = document.getElementById('customLabel').value.trim();
  const cue = document.getElementById('customCue').value.trim();
  if (!label) { alert('Enter a drill name'); return; }
  const id = 'custom_' + Date.now();
  const list = loadCustomDrills();
  list.push({ id, cat, label, cue });
  saveCustomDrills(list);
  document.getElementById('customLabel').value = '';
  document.getElementById('customCue').value = '';
  const checked = {};
  for (const k of Object.keys(CATEGORIES)) checked[k] = getChecked(k);
  renderSelectors();
  for (const [k, ids] of Object.entries(checked)) {
    ids.forEach(i => { const cb = document.querySelector(`input[data-category="${k}"][value="${i}"]`); if (cb) cb.checked = true; });
  }
  const cb = document.querySelector(`input[value="${id}"]`);
  if (cb) cb.checked = true;
  document.getElementById('status').textContent = 'Custom drill added';
  buildPlan();
}

function removeCustomDrill(id) {
  if (!confirm('Remove this custom drill?')) return;
  saveCustomDrills(loadCustomDrills().filter(c => c.id !== id));
  renderSelectors();
  buildPlan();
}

function exportCustomDrills() {
  const json = JSON.stringify(loadCustomDrills(), null, 2);
  navigator.clipboard?.writeText(json);
  alert('Custom drills JSON copied to clipboard (' + loadCustomDrills().length + ' items)');
}

function getItemAny(id) {
  for (const cat of Object.values(CATEGORIES)) {
    const item = cat.items.find(i => i.id === id);
    if (item) return { ...item, _cat: Object.keys(CATEGORIES).find(k => CATEGORIES[k].items.includes(item)) };
  }
  return null;
}

function filterDrills(q) {
  const query = (q || '').toLowerCase().trim();
  document.querySelectorAll('.check-list label').forEach(lbl => {
    lbl.style.display = !query || lbl.textContent.toLowerCase().includes(query) ? '' : 'none';
  });
}

function renderSelectors() {
  for (const cat of Object.values(CATEGORIES)) {
    cat.items = cat.items.filter(i => !String(i.id).startsWith('custom_'));
  }
  mergeCustomIntoCategories();
  populateCustomCatSelect();

  const grid = document.getElementById('selector-grid');
  grid.innerHTML = '';
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    const fs = document.createElement('fieldset');
    fs.className = 'panel' + (cat.wide ? ' wide' : '') + (cat.full ? ' full' : '');
    fs.dataset.category = key;
    const legend = document.createElement('legend');
    legend.textContent = cat.title;
    fs.appendChild(legend);

    const list = document.createElement('div');
    list.className = 'check-list' + (cat.xxl ? ' xxl' : cat.xl ? ' xl' : cat.tall ? ' tall' : '');
    cat.items.forEach(item => {
      const lbl = document.createElement('label');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.name = key;
      cb.value = item.id;
      cb.dataset.category = key;
      if (cat.defaultAll) cb.checked = true;
      lbl.appendChild(cb);
      const txt = document.createTextNode(item.label);
      lbl.appendChild(txt);
      if (item.custom) {
        const tag = document.createElement('span');
        tag.className = 'custom-tag';
        tag.textContent = 'custom';
        lbl.appendChild(tag);
        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'danger';
        del.textContent = '×';
        del.style.cssText = 'margin-left:auto;border:none;background:none;cursor:pointer;font-size:14px;padding:0 4px;';
        del.onclick = (e) => { e.preventDefault(); removeCustomDrill(item.id); };
        lbl.appendChild(del);
      }
      list.appendChild(lbl);
    });
    fs.appendChild(list);

    const actions = document.createElement('div');
    actions.className = 'panel-actions';
    const btnAll = document.createElement('button');
    btnAll.type = 'button';
    btnAll.textContent = 'All';
    btnAll.onclick = () => setCategoryChecks(key, true);
    const btnNone = document.createElement('button');
    btnNone.type = 'button';
    btnNone.textContent = 'None';
    btnNone.onclick = () => setCategoryChecks(key, false);
    actions.appendChild(btnAll);
    actions.appendChild(btnNone);
    fs.appendChild(actions);

    grid.appendChild(fs);
  }
}

function setCategoryChecks(cat, checked) {
  document.querySelectorAll(`input[data-category="${cat}"]`).forEach(cb => cb.checked = checked);
}

function getChecked(cat) {
  return [...document.querySelectorAll(`input[data-category="${cat}"]:checked`)].map(cb => cb.value);
}

function getItem(cat, id) {
  return CATEGORIES[cat].items.find(i => i.id === id);
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function buildPlan() {
  const club = document.getElementById('club').value || '_______________';
  const coach = document.getElementById('coach').value || '_______________';
  const dateEl = document.getElementById('date');
  const date = dateEl.value
    ? new Date(dateEl.value + 'T12:00:00').toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' })
    : '_______________';

  const blocks = getChecked('blocks');
  const warmup = getChecked('warmup');
  const movement = getChecked('movement');
  const conditioning = getChecked('conditioning');
  const flex = getChecked('flex');
  const lines = getChecked('lines');
  const vault = getChecked('vault');
  const barsCast = getChecked('bars_cast');
  const barsKipFloor = getChecked('bars_kip_floor');
  const barsKip = getChecked('bars_kip');
  const barsSkills = getChecked('bars_skills');
  const barsAll = getCheckedMulti(BARS_CATS);
  const beamAll = getCheckedMulti(BEAM_CATS);
  const floorAll = getCheckedMulti(FLOOR_CATS);
  const tramp = getChecked('tramp');
  const testing = getChecked('testing_battery');
  const queue = getChecked('queue');
  const close = getChecked('close');

  let html = '';

  // PAGE 1
  html += `<div class="page">
    <header>
      <h1>Coach Rosetta Stone — Class Plan</h1>
      <div class="meta">
        <span>USA Gymnastics Development Program</span>
        <span>Club: ${esc(club)}</span>
        <span>Date: ${esc(date)}</span>
        <span>Coach: ${esc(coach)}</span>
      </div>
    </header>
    <div class="note"><strong>Selected blocks:</strong> ${blocks.length ? blocks.map(id => esc(getItem('blocks', id)?.block)).join(' · ') : 'None selected'}</div>

    <h2>Class timeline</h2>
    <table><tr><th>Time</th><th>Block</th><th>Selected content</th></tr>`;
  if (blocks.length) {
    blocks.forEach(id => {
      const b = getItem('blocks', id);
      let content = '—';
      if (id === 'b_act') content = warmup.length ? warmup.map(i => getItem('warmup', i)?.label.split('—')[0].trim()).join('; ') : 'Universal warm-up';
      else if (id === 'b_mov') content = movement.length ? movement.map(i => getItem('movement', i)?.label).join(' → ') : 'Sequence A';
      else if (id === 'b_cond') content = conditioning.length ? conditioning.map(i => getItem('conditioning', i)?.label).join('; ') : '—';
      else if (id === 'b_flex') content = flex.length ? flex.map(i => getItem('flex', i)?.label).join('; ') : '—';
      else if (id === 'b_line') content = lines.length ? lines.map(i => getItem('lines', i)?.label.split(':')[0]).join('; ') : '—';
      else if (id === 'b_vault') content = vault.length ? vault.map(i => getItem('vault', i)?.label).join('; ') : '—';
      else if (id === 'b_bars') content = barsAll.length ? barsAll.map(i => {
        const item = getItemAny(i);
        return item?.label?.split('—').pop()?.trim() || item?.label;
      }).join('; ') : '—';
      else if (id === 'b_beam') content = beamAll.length ? beamAll.map(i => getItemAny(i)?.label).join('; ') : '—';
      else if (id === 'b_floor') content = floorAll.length ? floorAll.map(i => getItemAny(i)?.label).join('; ') : '—';
      else if (id === 'b_close') content = close.length ? close.map(i => getItem('close', i)?.label).join('; ') : 'Stretch and recap';
      html += `<tr><td>${esc(b.time)}</td><td>${esc(b.block)}</td><td>${esc(content)}</td></tr>`;
    });
  } else {
    html += `<tr><td colspan="3" class="empty">No blocks selected</td></tr>`;
  }
  html += `</table>`;

  if (warmup.length) {
    html += `<h2>Universal warm-up</h2><table><tr><th>Drill</th><th>Coach cue</th></tr>`;
    warmup.forEach(id => {
      const w = getItem('warmup', id);
      html += `<tr><td>${esc(w.label.split('—')[0])}</td><td>${esc(w.cue || '')}</td></tr>`;
    });
    html += `</table>`;
  }

  if (movement.length) {
    html += `<h2>Movement line</h2><pre class="seq">${movement.map((id, n) => (n+1) + '. ' + getItem('movement', id).label).join('\n')}</pre>`;
  }

  if (conditioning.length) {
    html += `<h2>Conditioning</h2><table><tr><th>Exercise</th><th>Cue</th></tr>`;

function populateCustomCatSelect() {
  const sel = document.getElementById('customCat');
  if (!sel) return;
  const skip = new Set(['blocks', 'testing_battery', 'lines']);
  const prev = sel.value;
  sel.innerHTML = '';
  for (const [key, cat] of Object.entries(CATEGORIES)) {
    if (skip.has(key)) continue;
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = cat.title;
    sel.appendChild(opt);
  }
  if (prev) sel.value = prev;
}

function applyDayPreset() {
  const day = document.getElementById('dayPreset').value;
  if (!day || !DAY_PRESETS[day]) return;
  document.querySelectorAll('#selector-grid input[type=checkbox]').forEach(cb => cb.checked = false);
  if (day === 'test') {
    document.querySelectorAll('input[data-category="testing_battery"]').forEach(cb => cb.checked = true);
    ['b_cond','b_flex','b_vault','b_bars','b_beam','b_floor'].forEach(id => {
      const cb = document.querySelector(`input[value="${id}"]`);
      if (cb) cb.checked = true;
    });
  } else {
    const preset = DAY_PRESETS[day];
    preset.checks.forEach(id => {
      const cb = document.querySelector(`input[value="${id}"]`);
      if (cb) cb.checked = true;
    });
    ['b_act','b_mov','b_cond','b_flex','b_close'].forEach(id => {
      const cb = document.querySelector(`input[value="${id}"]`);
      if (cb) cb.checked = true;
    });
  }
  buildPlan();
}

function saveSelections() {
  const data = {
    club: document.getElementById('club').value,
    coach: document.getElementById('coach').value,
    date: document.getElementById('date').value,
    dayPreset: document.getElementById('dayPreset').value,
    checks: {}
  };
  for (const key of Object.keys(CATEGORIES)) {
    data.checks[key] = getChecked(key);
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  document.getElementById('status').textContent = 'Selections saved';
}

function loadSelections() {
  const raw = localStorage.getItem(STORAGE_KEY);
  if (!raw) return;
  try {
    const data = JSON.parse(raw);
    if (data.club) document.getElementById('club').value = data.club;
    if (data.coach) document.getElementById('coach').value = data.coach;
    if (data.date) document.getElementById('date').value = data.date;
    if (data.dayPreset) document.getElementById('dayPreset').value = data.dayPreset;
    document.querySelectorAll('#selector-grid input[type=checkbox]').forEach(cb => cb.checked = false);
    if (data.checks) {
      for (const [cat, ids] of Object.entries(data.checks)) {
        ids.forEach(id => {
          const cb = document.querySelector(`input[data-category="${cat}"][value="${id}"]`);
          if (cb) cb.checked = true;
        });
      }
    }
    document.getElementById('status').textContent = 'Loaded saved selections';
  } catch(e) {}
}

function resetAll() {
  if (!confirm('Clear all selections and reset to defaults?')) return;
  localStorage.removeItem(STORAGE_KEY);
  document.getElementById('club').value = '';
  document.getElementById('coach').value = '';
  document.getElementById('date').value = '';
  document.getElementById('dayPreset').value = '';
  document.querySelectorAll('#selector-grid input[type=checkbox]').forEach(cb => {
    cb.checked = cb.closest('fieldset').querySelector('legend').textContent.includes('blocks');
  });
  buildPlan();
}

// Init
renderSelectors();

if (!localStorage.getItem(STORAGE_KEY)) {
  // sensible defaults for first visit

  ['wu_run','wu_releve','wu_skip','mv_march','mv_froll','mv_broll','c_hollow','c_candle','c_push',

   'q_hollow','cl_stretch','cl_recap'].forEach(id => {
    const cb = document.querySelector(`input[value="${id}"]`);

}
buildPlan();
